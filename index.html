<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-Konfident</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-danger">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">🚨 e-Konfident</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card shadow-sm mb-4">
            <div class="card-body text-center">
                <h5 class="card-title">Zgłoś Wykroczenie</h5>
                <p class="card-text text-muted">Zrób zdjęcie, system automatycznie pobierze Twoją lokalizację.</p>
                
                <video id="camera-stream" class="w-100 rounded mb-3 bg-dark" autoplay playsinline style="min-height: 250px;"></video>
                <canvas id="photo-canvas" class="d-none w-100 rounded mb-3"></canvas>
                
                <button id="capture-btn" class="btn btn-danger btn-lg w-100 mb-2">📸 Zrób Zdjęcie</button>
                <button id="retake-btn" class="btn btn-secondary btn-lg w-100 d-none">🔄 Powtórz</button>
            </div>
        </div>

        <div id="location-section" class="card shadow-sm mb-4 d-none">
            <div class="card-body">
                <h5 class="card-title">Lokalizacja Zdarzenia</h5>
                <p id="coords-text" class="small text-muted">Pobieranie koordynatów GPS...</p>
                <div id="map" class="w-100 rounded" style="height: 250px;"></div>
                
                <button id="share-btn" class="btn btn-primary btn-lg w-100 mt-3">📤 Udostępnij Zgłoszenie</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
